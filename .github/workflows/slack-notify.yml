name: Slack Notify

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  notify:
    name: Send Slack notification
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

    steps:
      - name: Skip when Slack is not configured
        if: env.SLACK_WEBHOOK_URL == '' && (env.SLACK_BOT_TOKEN == '' || env.SLACK_CHANNEL_ID == '')
        run: echo "Slack is not configured; set SLACK_BOT_TOKEN + SLACK_CHANNEL_ID or SLACK_WEBHOOK_URL."

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != '' || (env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != '')
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            issues)
              kind="Issue"
              action="$(jq -r '.action' "$EVENT_PATH")"
              title="$(jq -r '.issue.title' "$EVENT_PATH")"
              url="$(jq -r '.issue.html_url' "$EVENT_PATH")"
              ;;
            pull_request)
              kind="Pull request"
              action="$(jq -r '.action' "$EVENT_PATH")"
              title="$(jq -r '.pull_request.title' "$EVENT_PATH")"
              url="$(jq -r '.pull_request.html_url' "$EVENT_PATH")"
              ;;
            workflow_dispatch)
              kind="Manual test"
              action="started"
              title="Slack notification workflow"
              url="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
              ;;
            *)
              kind="Repository event"
              action="$EVENT_NAME"
              title="$REPOSITORY"
              url="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
              ;;
          esac

          text="[$REPOSITORY] $kind $action: <$url|$title> by $ACTOR"

          if [ -n "${SLACK_BOT_TOKEN:-}" ] && [ -n "${SLACK_CHANNEL_ID:-}" ]; then
            jq -n \
              --arg channel "$SLACK_CHANNEL_ID" \
              --arg text "$text" \
              '{channel: $channel, text: $text, unfurl_links: false, unfurl_media: false}' \
              > slack-payload.json
            curl --fail --show-error --silent \
              --request POST \
              --header "Authorization: Bearer $SLACK_BOT_TOKEN" \
              --header 'Content-Type: application/json; charset=utf-8' \
              --data @slack-payload.json \
              https://slack.com/api/chat.postMessage \
              > slack-response.json
            if [ "$(jq -r '.ok' slack-response.json)" != "true" ]; then
              jq -r '.error // "unknown_slack_error"' slack-response.json >&2
              exit 1
            fi
          else
            if [ -n "${SLACK_CHANNEL_ID:-}" ]; then
              jq -n --arg channel "$SLACK_CHANNEL_ID" --arg text "$text" '{channel: $channel, text: $text}' > slack-payload.json
            else
              jq -n --arg text "$text" '{text: $text}' > slack-payload.json
            fi
            curl --fail --show-error --silent \
              --request POST \
              --header 'Content-Type: application/json' \
              --data @slack-payload.json \
              "$SLACK_WEBHOOK_URL" >/dev/null
          fi
