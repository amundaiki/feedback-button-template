name: Slack Notify

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  notify:
    name: Send Slack notification
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Skip when Slack webhook is not configured
        if: env.SLACK_WEBHOOK_URL == ''
        run: echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            issues)
              kind="Issue"
              action="$(jq -r '.action' "$EVENT_PATH")"
              title="$(jq -r '.issue.title' "$EVENT_PATH")"
              url="$(jq -r '.issue.html_url' "$EVENT_PATH")"
              ;;
            pull_request)
              kind="Pull request"
              action="$(jq -r '.action' "$EVENT_PATH")"
              title="$(jq -r '.pull_request.title' "$EVENT_PATH")"
              url="$(jq -r '.pull_request.html_url' "$EVENT_PATH")"
              ;;
            workflow_dispatch)
              kind="Manual test"
              action="started"
              title="Slack notification workflow"
              url="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
              ;;
            *)
              kind="Repository event"
              action="$EVENT_NAME"
              title="$REPOSITORY"
              url="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
              ;;
          esac

          text="[$REPOSITORY] $kind $action: <$url|$title> by $ACTOR"
          jq -n --arg text "$text" '{text: $text}' > slack-payload.json
          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-Type: application/json' \
            --data @slack-payload.json \
            "$SLACK_WEBHOOK_URL" >/dev/null
